<header class="sticky top-0 z-50 w-full bg-light-card dark:bg-dark-card shadow-md transition-smooth">
    <div class="container mx-auto px-4 py-3 flex items-center justify-between">
        <!-- 左侧 Logo -->
        <a href="/index.html" class="flex items-center space-x-2">
            <img src="/assets/images/common/lencey.png" alt="Logo" class="h-10 w-auto">
            <span class="text-xl font-bold text-gray-800 dark:text-white">
                <span class="lang-zh">Vers123 游戏导航</span>
                <span class="lang-en hidden">Vers123 Game Nav</span>
            </span>
        </a>

        <!-- 中间导航链接 - 仅在桌面显示 -->
        <nav class="hidden md:flex items-center space-x-8">
            <a href="/index.html" class="text-gray-600 dark:text-gray-300 hover:text-primary dark:hover:text-primary transition-smooth">
                <span class="lang-zh">主页</span>
                <span class="lang-en hidden">Home</span>
            </a>
            <a href="/pages/mihoyo/index.html" class="text-gray-600 dark:text-gray-300 hover:text-primary dark:hover:text-primary transition-smooth">
                <span class="lang-zh">米哈游</span>
                <span class="lang-en hidden">miHoYo</span>
            </a>
            <a href="/pages/other-games/index.html" class="text-gray-600 dark:text-gray-300 hover:text-primary dark:hover:text-primary transition-smooth">
                <span class="lang-zh">其他游戏</span>
                <span class="lang-en hidden">Other Games</span>
            </a>
        </nav>

        <!-- 右侧功能按钮 -->
        <div class="flex items-center space-x-4">
            <!-- 搜索按钮 -->
            <button class="p-2 rounded-full bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600 transition-smooth" id="searchToggle">
                <svg aria-hidden="true" class="icon w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path>
                </svg>
            </button>

            <!-- 主题切换按钮 -->
            <button class="p-2 rounded-full bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600 transition-smooth" id="themeToggle">
                <svg aria-hidden="true" class="icon icon-moon w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
                <svg aria-hidden="true" class="icon icon-sun w-5 h-5 hidden" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M6.76 4.84l-1.8-1.79L3.17 5.84l1.79 1.79 1.8-2.79zM1 13h3v-2H1v2zm10 8h2v-3h-2v3zm9.83-11.17l-1.79-1.79-2.79 1.8 1.79 1.79 2.79-1.8zM17 13h6v-2h-6v2zM6.76 19.16l2.79-1.8-1.79-1.79-2.79 1.8 1.79 1.79z"></path>
                </svg>
            </button>

            <!-- 语言切换按钮 -->
            <button class="p-2 rounded-full bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600 transition-smooth" id="langToggle">
                <svg aria-hidden="true" class="icon w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2a10 10 0 100 20 10 10 0 000-20zm0 2a8 8 0 110 16 8 8 0 010-16z"></path>
                </svg>
            </button>

            <!-- 用户菜单 -->
            <div class="relative" id="userMenu">
                <button class="p-2 rounded-full bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600 transition-smooth">
                    <svg aria-hidden="true" class="icon w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"></path>
                    </svg>
                </button>
                <!-- 下拉菜单 -->
                <div class="hidden absolute right-0 mt-2 w-48 bg-light-card dark:bg-dark-card rounded-lg shadow-lg border border-gray-200 dark:border-gray-700 py-2" id="userDropdown">
                    <a href="/pages/account/index.html" class="block px-4 py-2 text-gray-800 dark:text-white hover:bg-gray-100 dark:hover:bg-gray-700 transition-smooth">
                        <span class="lang-zh">账户管理</span>
                        <span class="lang-en hidden">Account</span>
                    </a>
                    <a href="/pages/admin/index.html" class="block px-4 py-2 text-gray-800 dark:text-white hover:bg-gray-100 dark:hover:bg-gray-700 transition-smooth">
                        <span class="lang-zh">管理员</span>
                        <span class="lang-en hidden">Admin</span>
                    </a>
                    <hr class="border-gray-200 dark:border-gray-700 my-2">
                    <a href="/pages/auth/login.html" class="block px-4 py-2 text-gray-800 dark:text-white hover:bg-gray-100 dark:hover:bg-gray-700 transition-smooth">
                        <span class="lang-zh">登录</span>
                        <span class="lang-en hidden">Login</span>
                    </a>
                </div>
            </div>
        </div>
    </div>
</header>
