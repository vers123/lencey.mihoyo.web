<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Vers123游戏导航网站 - 提供米哈游(miHoYo)游戏和其他热门游戏的官方导航链接">
    <meta name="keywords" content="游戏导航,米哈游,miHoYo,原神,崩坏,星穹铁道,绝区零,游戏官网">
    <meta name="author" content="Vers123">
    <title>选择访问页面 - Vers123游戏导航</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Using inline SVG icons instead of Font Awesome to reduce external dependencies -->
    <!-- Performance hints: preconnect for common CDNs (safe, no visual changes) -->
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#FF6B35',
                        secondary: '#FFC107',
                        dark: '#1A1A2E',
                        light: '#F7F7F9',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                },
            }
        }
    </script>
    <script>
        // 页面加载时初始化主题和语言
        document.addEventListener('DOMContentLoaded', () => {
            const darkModeToggles = document.querySelectorAll('.dark-mode-toggle');
            const langToggles = document.querySelectorAll('.lang-toggle-btn');
            const htmlElement = document.documentElement;
            
            // 检查本地存储中的主题偏好设置
            const isDark = localStorage.getItem('theme') === 'dark';
            if (isDark) {
                htmlElement.classList.add('dark');
                // show sun icon when dark
                darkModeToggles.forEach(toggle => {
                    const moon = toggle.querySelector('.icon-moon');
                    const sun = toggle.querySelector('.icon-sun');
                    if (moon) moon.style.display = 'none';
                    if (sun) sun.style.display = 'inline-block';
                });
            }
            
            // 检查本地存储中的语言偏好设置
            const preferredLang = localStorage.getItem('preferredLang');
            if (preferredLang === 'en') {
                toggleLanguage();
            }
            
            // 切换暗黑模式
            darkModeToggles.forEach(toggle => {
                toggle.addEventListener('click', toggleTheme);
            });
            
            // 切换语言
            langToggles.forEach(toggle => {
                toggle.addEventListener('click', toggleLanguage);
            });
        });
        
        // 切换暗黑模式
        function toggleTheme() {
            const htmlElement = document.documentElement;
            const darkModeToggles = document.querySelectorAll('.dark-mode-toggle');

            htmlElement.classList.toggle('dark');
            const isDark = htmlElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            
            // swap visible SVGs (moon <-> sun)
            darkModeToggles.forEach(toggle => {
                const moon = toggle.querySelector('.icon-moon');
                const sun = toggle.querySelector('.icon-sun');
                if (isDark) {
                    if (moon) moon.style.display = 'none';
                    if (sun) sun.style.display = 'inline-block';
                } else {
                    if (moon) moon.style.display = 'inline-block';
                    if (sun) sun.style.display = 'none';
                }
            });
        }
        
        // 切换语言
        function toggleLanguage() {
            const zhElements = document.querySelectorAll('.lang-zh');
            const enElements = document.querySelectorAll('.lang-en');

            // Safety guard: if language elements are missing, do nothing
            if (!zhElements.length || !enElements.length) return;

            // 检查当前语言状态（默认中文）
            const isCurrentlyChinese = zhElements[0].style.display !== 'none';
            
            if (isCurrentlyChinese) {
                // 切换到英文
                zhElements.forEach(el => {
                    el.style.display = 'none';
                });
                enElements.forEach(el => {
                    el.style.display = 'inline';
                });
                localStorage.setItem('preferredLang', 'en');
            } else {
                // 切换到中文
                zhElements.forEach(el => {
                    el.style.display = 'inline';
                });
                enElements.forEach(el => {
                    el.style.display = 'none';
                });
                localStorage.setItem('preferredLang', 'zh');
            }
        }
    </script>
    <style>
        /* Consolidated styles: utilities, image responsiveness, dark-mode and language visibility */
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .transition-smooth {
                transition: all 0.3s ease-in-out;
            }
        }

        /* 图片自适应：确保卡片和 logo 在各种视口内按容器宽度缩放，且保持纵横比 */
        .game-card img,
        .container img,
        header img,
        footer img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        /* 小图标基础样式 */
        .icon {
            width: 1.2em;
            height: 1.2em;
            vertical-align: middle;
            fill: currentColor;
            display: inline-block;
        }

        /* 暗黑模式样式 */
        .dark body {
            background-color: #1A1A2E;
            color: #e5e5e5;
        }
        
        .dark .bg-gray-100 {
            background-color: #1A1A2E;
        }
        
        .dark .bg-white {
            background-color: #2d2d44;
        }
        
        .dark .text-gray-800 {
            color: #e5e5e5;
        }
        
        .dark .text-gray-600 {
            color: #a0a0a0;
        }
        
        /* Language specific styles */
        .lang-zh {
            display: inline;
        }
        
        .lang-en {
            display: none;
        }
        
        .lang-toggle-btn {
            background-color: transparent;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 18px;
            padding: 5px 10px;
            border-radius: 5px;
        }
        
        .lang-toggle-btn:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">
    <!-- 头部区域 -->
    <header class="bg-primary text-white shadow-lg">
        <div class="container mx-auto px-4 py-4 flex items-center relative">
            <h1 class="text-2xl md:text-3xl font-bold flex items-center">
                <!-- home icon -->
                <svg class="icon mr-3" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M3 10.5L12 4l9 6.5V20a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1V10.5z"></path></svg>
                <span class="lang-zh">Vers123网站 导航</span>
                <span class="lang-en">Vers123 Website Navigation</span>
            </h1>
            <div class="hidden md:block absolute right-4 flex items-center">
                <button class="dark-mode-toggle text-white hover:text-gray-200 transition-smooth mr-4" title="切换主题">
                    <!-- two SVGs: moon (shown by default) and sun (shown when dark) -->
                    <svg class="icon icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    <svg class="icon icon-sun" style="display:none" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M6.76 4.84l-1.8-1.79L3.17 5.84l1.79 1.79 1.8-2.79zM1 13h3v-2H1v2zm10 8h2v-3h-2v3zm9.83-11.17l-1.79-1.79-2.79 1.8 1.79 1.79 2.79-1.8zM17 13h6v-2h-6v2zM6.76 19.16l2.79-1.8-1.79-1.79-2.79 1.8 1.79 1.79z"></path></svg>
                </button>
                <button class="lang-toggle-btn p-2 rounded-full hover:bg-white/20 transition-smooth" title="切换语言">
                    <!-- language/globe icon -->
                    <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm0 2a8 8 0 110 16 8 8 0 010-16z"></path></svg>
                </button>
            </div>
            <div class="md:hidden absolute right-4 flex items-center">
                <button class="dark-mode-toggle text-white hover:text-gray-200 transition-smooth mr-2" title="切换主题">
                    <svg class="icon icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    <svg class="icon icon-sun" style="display:none" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M6.76 4.84l-1.8-1.79L3.17 5.84l1.79 1.79 1.8-2.79zM1 13h3v-2H1v2zm10 8h2v-3h-2v3zm9.83-11.17l-1.79-1.79-2.79 1.8 1.79 1.79 2.79-1.8zM17 13h6v-2h-6v2zM6.76 19.16l2.79-1.8-1.79-1.79-2.79 1.8 1.79 1.79z"></path></svg>
                </button>
                <button class="lang-toggle-btn p-2 rounded-full hover:bg-white/20 transition-smooth" title="切换语言">
                    <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm0 2a8 8 0 110 16 8 8 0 010-16z"></path></svg>
                </button>
            </div>
        </div>
    </header>

    <!-- 主要内容区域 -->
    <main class="flex-grow flex flex-col items-center justify-center p-6">
        <div class="bg-white rounded-lg shadow-md p-8 max-w-md w-full">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">
                    <span class="lang-zh">请选择要访问的页面</span>
                    <span class="lang-en">Please select the page to visit</span>
                </h2>
                <div class="grid grid-cols-1 gap-4">

                    <!-- 跳转到 miHoYo.html -->
                    <a href="web/mihoyo_web/miHoYo.html" class="block">
                        <button class="w-full bg-primary hover:bg-primary/90 text-white font-semibold py-3 px-6 rounded-lg transition-smooth flex items-center justify-center">
                            <!-- gamepad icon -->
                            <svg class="icon mr-2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 12a2 2 0 100-4 2 2 0 000 4zm12-2a2 2 0 11-4 0 2 2 0 014 0zM4 14c0-2 2-6 8-6s8 4 8 6v2a2 2 0 01-2 2h-12a2 2 0 01-2-2v-2z"></path></svg>
                            <span class="lang-zh">访问 miHoYo 导航页</span>
                            <span class="lang-en">Visit miHoYo Navigation Page</span>
                        </button>
                    </a>

                    <!-- 跳转到 another_games.html -->
                    <a href="web/another_game_web/another_games.html" class="block">
                        <button class="w-full bg-primary hover:bg-primary/90 text-white font-semibold py-3 px-6 rounded-lg transition-smooth flex items-center justify-center">
                            <svg class="icon mr-2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 12a2 2 0 100-4 2 2 0 000 4zm12-2a2 2 0 11-4 0 2 2 0 014 0zM4 14c0-2 2-6 8-6s8 4 8 6v2a2 2 0 01-2 2h-12a2 2 0 01-2-2v-2z"></path></svg>
                            <span class="lang-zh">访问其他游戏导航页</span>
                            <span class="lang-en">Visit Other Games Navigation Page</span>
                        </button>
                    </a>

                </div>
            </div>
    </main>

    <!-- 页脚区域 -->
    <footer class="bg-dark text-white py-6">
        <div class="container mx-auto px-4 text-center">
            <p>
                <span class="lang-zh">© 2025 游戏导航 | 本网站仅作展示用途</span>
                <span class="lang-en">© 2025 Game Navigation | This website is for display purposes only</span>
            </p>
            <p class="text-sm mt-2 opacity-70">
                <span class="lang-zh">所有商标和版权均属于各自所有者</span>
                <span class="lang-en">All trademarks and copyrights belong to their respective owners</span>
            </p>
        </div>
    </footer>
</body>
</html>
