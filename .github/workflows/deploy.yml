name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 关键：将 permissions 移到 jobs.deploy 层级内，确保权限生效
    permissions:
      contents: write  # 提升为 write，允许推送 gh-pages 分支
      pages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整历史，避免部署异常

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./       # 你的站点根目录（纯静态文件）
          publish_branch: gh-pages  # 部署到 gh-pages 分支
          force_orphan: true    # 强制创建干净的 gh-pages 分支（避免历史冲突）