<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="其他游戏导航 - Minecraft、CS2、塞尔达传说等热门游戏官方链接" name="description">
    <title>Other Games - Vers123</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- 自定义样式 -->
    <style>
        @layer utilities {
            .transition-smooth {
                transition: all 0.3s ease-in-out;
            }
            .hover-lift {
                transform: translateY(-2px);
            }
        }

        .icon {
            width: 1em;
            height: 1em;
            vertical-align: middle;
            fill: currentColor;
            display: inline-block;
        }

        body {
            font-family: Inter, system-ui, sans-serif;
            transition: background-color 0.3s ease-in-out, color 0.3s ease-in-out;
        }

        .favorite-btn.active {
            color: #ef4444;
        }

        .game-card {
            position: relative;
        }

        .favorite-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            padding: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .dark .favorite-btn {
            background: rgba(45, 45, 68, 0.9);
        }

        .favorite-btn:hover {
            transform: scale(1.1);
        }
    </style>

    <!-- Tailwind 配置 -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#4A90E2',
                        secondary: '#50E3C2',
                        dark: {
                            DEFAULT: '#1A1A2E',
                            card: '#2d2d44'
                        },
                        light: {
                            DEFAULT: '#F7F7F9',
                            card: '#FFFFFF'
                        },
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
</head>

<body class="bg-light min-h-screen dark:bg-dark transition-smooth">
<!-- 主题切换按钮 -->
<button class="fixed top-4 right-4 p-2 rounded-full bg-gray-200 dark:bg-dark-card text-gray-800 dark:text-white hover:bg-gray-300 dark:hover:bg-gray-700 transition-smooth z-10"
        id="themeToggle">
    <svg aria-hidden="true" class="icon icon-moon w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
    </svg>
    <svg aria-hidden="true" class="icon icon-sun w-5 h-5 hidden" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M6.76 4.84l-1.8-1.79L3.17 5.84l1.79 1.79 1.8-2.79zM1 13h3v-2H1v2zm10 8h2v-3h-2v3zm9.83-11.17l-1.79-1.79-2.79 1.8 1.79 1.79 2.79-1.8zM17 13h6v-2h-6v2zM6.76 19.16l2.79-1.8-1.79-1.79-2.79 1.8 1.79 1.79z"></path>
    </svg>
</button>

<!-- 语言切换按钮 -->
<button class="fixed top-4 left-4 p-2 rounded-full bg-gray-200 dark:bg-dark-card text-gray-800 dark:text-white hover:bg-gray-300 dark:hover:bg-gray-700 transition-smooth z-10"
        id="langToggle">
    <svg aria-hidden="true" class="icon w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2a10 10 0 100 20 10 10 0 000-20zm0 2a8 8 0 110 16 8 8 0 010-16z"></path>
    </svg>
</button>

<!-- 返回主页按钮 -->
<a class="fixed top-4 left-16 p-2 rounded-full bg-gray-200 dark:bg-dark-card text-gray-800 dark:text-white hover:bg-gray-300 dark:hover:bg-gray-700 transition-smooth z-10"
   href="../../index.html">
    <svg aria-hidden="true" class="icon w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M19 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H19v-2z"></path>
    </svg>
</a>

<!-- 主内容区 -->
<main class="container mx-auto px-4 py-16 max-w-5xl">
    <!-- 页面标题 -->
    <h1 class="text-3xl md:text-4xl font-bold text-center mb-8 text-gray-800 dark:text-white">
        <span class="lang-zh">其他游戏导航</span>
        <span class="lang-en hidden">Other Games Navigation</span>
    </h1>

    <!-- 搜索框 -->
    <div class="mb-8">
        <input
                class="lang-zh w-full p-3 border border-gray-200 dark:border-gray-700 rounded-lg bg-light-card dark:bg-dark-card text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50 transition-smooth"
                id="searchInput"
                placeholder="搜索游戏..."
                type="text"
        >
        <input
                class="lang-en hidden w-full p-3 border border-gray-200 dark:border-gray-700 rounded-lg bg-light-card dark:bg-dark-card text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50 transition-smooth"
                id="searchInputEn"
                placeholder="Search games..."
                type="text"
        >
    </div>

    <!-- 游戏卡片网格 -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="gamesGrid">
        <!-- Minecraft -->
        <div class="game-card bg-light-card dark:bg-dark-card rounded-xl shadow-lg hover:shadow-xl transition-smooth hover:hover-lift overflow-hidden"
             data-game-name="Minecraft 我的世界">
            <button class="favorite-btn text-gray-400 hover:text-red-500" data-game-id="minecraft">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                </svg>
            </button>
            <a href="https://www.minecraft.net/" rel="noopener noreferrer" target="_blank">
                <img alt="Minecraft" class="w-full h-32 object-contain p-4"
                     loading="lazy" src="../../assets/images/another_games/game_logo/minecraft.svg">
                <div class="p-4">
                    <h3 class="text-xl font-bold text-primary mb-2">Minecraft</h3>
                    <p class="text-gray-600 dark:text-gray-400 text-sm">
                        <span class="lang-zh">沙盒游戏</span>
                        <span class="lang-en hidden">Sandbox Game</span>
                    </p>
                </div>
            </a>
        </div>
    </div>
</main>

<!-- 页脚 -->
<footer class="py-6 text-center text-gray-500 dark:text-gray-400 text-sm">
    <p>
        <span class="lang-zh">© 2025 Vers123 游戏导航 | 仅用于学习交流</span>
        <span class="lang-en hidden">© 2025 Vers123 Game Navigation | For learning only</span>
    </p>
</footer>

<script>
    // 页面初始化
    document.addEventListener('DOMContentLoaded', function() {
        // 1. 初始化暗黑模式
        const isDark = localStorage.getItem('theme') === 'dark';
        if (isDark) {
            document.documentElement.classList.add('dark');
            document.querySelector('.icon-moon').style.display = 'none';
            document.querySelector('.icon-sun').style.display = 'inline';
        }

        // 2. 初始化语言
        const preferredLang = localStorage.getItem('preferredLang');
        if (preferredLang === 'en') {
            toggleLanguage();
        }

        // 3. 绑定主题切换
        document.getElementById('themeToggle').addEventListener('click', toggleTheme);

        // 4. 绑定语言切换
        document.getElementById('langToggle').addEventListener('click', toggleLanguage);

        // 5. 初始化收藏功能
        initFavorites();

        // 6. 初始化搜索功能
        initSearch();
    });

    // 切换暗黑模式
    function toggleTheme() {
        const html = document.documentElement;
        html.classList.toggle('dark');
        const isDark = html.classList.contains('dark');

        localStorage.setItem('theme', isDark ? 'dark' : 'light');

        // 切换图标
        const iconMoon = document.querySelector('.icon-moon');
        const iconSun = document.querySelector('.icon-sun');
        iconMoon.style.display = isDark ? 'none' : 'inline';
        iconSun.style.display = isDark ? 'inline' : 'none';
    }

    // 切换语言
    function toggleLanguage() {
        const zhElements = document.querySelectorAll('.lang-zh');
        const enElements = document.querySelectorAll('.lang-en');
        const isZhVisible = zhElements[0].style.display !== 'none';

        // 切换显示状态
        zhElements.forEach(el => el.style.display = isZhVisible ? 'none' : 'inline');
        enElements.forEach(el => el.style.display = isZhVisible ? 'inline' : 'none');

        // 保存语言设置
        localStorage.setItem('preferredLang', isZhVisible ? 'en' : 'zh');
    }

    // 初始化收藏功能
    function initFavorites() {
        const favorites = JSON.parse(localStorage.getItem('favorites') || '[]');

        document.querySelectorAll('.favorite-btn').forEach(btn => {
            const gameId = btn.dataset.gameId;
            if (favorites.includes(gameId)) {
                btn.classList.add('active');
            }

            btn.addEventListener('click', function(e) {
                e.preventDefault();
                const index = favorites.indexOf(gameId);
                if (index > -1) {
                    favorites.splice(index, 1);
                    this.classList.remove('active');
                } else {
                    favorites.push(gameId);
                    this.classList.add('active');
                }
                localStorage.setItem('favorites', JSON.stringify(favorites));
            });
        });
    }

    // 初始化搜索功能
    function initSearch() {
        const searchInput = document.getElementById('searchInput');
        const searchInputEn = document.getElementById('searchInputEn');
        const gameCards = document.querySelectorAll('.game-card');

        function filterGames(query) {
            const lowerQuery = query.toLowerCase();
            gameCards.forEach(card => {
                const gameName = card.dataset.gameName.toLowerCase();
                if (gameName.includes(lowerQuery)) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        searchInput.addEventListener('input', (e) => filterGames(e.target.value));
        searchInputEn.addEventListener('input', (e) => filterGames(e.target.value));
    }
</script>
</body>
</html>
