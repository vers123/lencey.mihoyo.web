<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="用户注册 - Vers123游戏导航" name="description">
    <title>注册 | Register</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- 自定义样式 -->
    <style>
        @layer utilities {
            .transition-smooth {
                transition: all 0.3s ease-in-out;
            }
            .hover-lift {
                transform: translateY(-2px);
            }
        }

        .icon {
            width: 1em;
            height: 1em;
            vertical-align: middle;
            fill: currentColor;
            display: inline-block;
        }

        body {
            font-family: Inter, system-ui, sans-serif;
            transition: background-color 0.3s ease-in-out, color 0.3s ease-in-out;
        }
    </style>

    <!-- Tailwind 配置 -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#4A90E2',
                        secondary: '#50E3C2',
                        mihoyo: '#4A90E2',
                        dark: {
                            DEFAULT: '#1A1A2E',
                            card: '#2d2d44'
                        },
                        light: {
                            DEFAULT: '#F7F7F9',
                            card: '#FFFFFF'
                        },
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
</head>

<body class="bg-light min-h-screen flex flex-col items-center justify-center p-4 dark:bg-dark transition-smooth">
<!-- 主题切换按钮 -->
<button class="fixed top-4 right-4 p-2 rounded-full bg-gray-200 dark:bg-dark-card text-gray-800 dark:text-white hover:bg-gray-300 dark:hover:bg-gray-700 transition-smooth z-10"
        id="themeToggle">
    <svg aria-hidden="true" class="icon icon-moon w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
    </svg>
    <svg aria-hidden="true" class="icon icon-sun w-5 h-5 hidden" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M6.76 4.84l-1.8-1.79L3.17 5.84l1.79 1.79 1.8-2.79zM1 13h3v-2H1v2zm10 8h2v-3h-2v3zm9.83-11.17l-1.79-1.79-2.79 1.8 1.79 1.79 2.79-1.8zM17 13h6v-2h-6v2zM6.76 19.16l2.79-1.8-1.79-1.79-2.79 1.8 1.79 1.79z"></path>
    </svg>
</button>

<!-- 语言切换按钮 -->
<button class="fixed top-4 left-4 p-2 rounded-full bg-gray-200 dark:bg-dark-card text-gray-800 dark:text-white hover:bg-gray-300 dark:hover:bg-gray-700 transition-smooth z-10"
        id="langToggle">
    <svg aria-hidden="true" class="icon w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2a10 10 0 100 20 10 10 0 000-20zm0 2a8 8 0 110 16 8 8 0 010-16z"></path>
    </svg>
</button>

<!-- 主内容区 -->
<div class="max-w-md w-full bg-light-card dark:bg-dark-card rounded-xl shadow-lg p-8 transition-smooth">
    <!-- 页面标题 -->
    <h1 class="text-3xl font-bold text-center text-gray-800 dark:text-white mb-6">
        <span class="lang-zh">用户注册</span>
        <span class="lang-en hidden">Register</span>
    </h1>

    <!-- 注册表单 -->
    <form id="registerForm" class="space-y-6">
        <!-- 邮箱 -->
        <div>
            <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
                <span class="lang-zh">邮箱</span>
                <span class="lang-en hidden">Email</span>
            </label>
            <input type="email" id="email" name="email" 
                   class="w-full p-3 border border-gray-200 dark:border-gray-700 rounded-lg bg-light-card dark:bg-dark-card text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50 transition-smooth" 
                   required>
        </div>

        <!-- 昵称 -->
        <div>
            <label for="nickname" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
                <span class="lang-zh">昵称</span>
                <span class="lang-en hidden">Nickname</span>
            </label>
            <input type="text" id="nickname" name="nickname" 
                   class="w-full p-3 border border-gray-200 dark:border-gray-700 rounded-lg bg-light-card dark:bg-dark-card text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50 transition-smooth" 
                   required>
        </div>

        <!-- 密码 -->
        <div>
            <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
                <span class="lang-zh">密码</span>
                <span class="lang-en hidden">Password</span>
            </label>
            <input type="password" id="password" name="password" 
                   class="w-full p-3 border border-gray-200 dark:border-gray-700 rounded-lg bg-light-card dark:bg-dark-card text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50 transition-smooth" 
                   required>
            <p class="mt-1 text-xs text-gray-500 dark:text-gray-400">
                <span class="lang-zh">密码必须至少12个字符，包含大写字母、小写字母、数字和特殊符号</span>
                <span class="lang-en hidden">Password must be at least 12 characters, including uppercase, lowercase, numbers and special characters</span>
            </p>
        </div>

        <!-- 确认密码 -->
        <div>
            <label for="confirmPassword" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
                <span class="lang-zh">确认密码</span>
                <span class="lang-en hidden">Confirm Password</span>
            </label>
            <input type="password" id="confirmPassword" name="confirmPassword" 
                   class="w-full p-3 border border-gray-200 dark:border-gray-700 rounded-lg bg-light-card dark:bg-dark-card text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50 transition-smooth" 
                   required>
        </div>

        <!-- 密保问题 -->
        <div>
            <label for="securityQuestion" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
                <span class="lang-zh">密保问题</span>
                <span class="lang-en hidden">Security Question</span>
            </label>
            <select id="securityQuestion" name="securityQuestion" 
                    class="w-full p-3 border border-gray-200 dark:border-gray-700 rounded-lg bg-light-card dark:bg-dark-card text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50 transition-smooth" 
                    required>
                <option value="">-- 请选择 --</option>
                <option value="What is your mother's maiden name?">
                    <span class="lang-zh">你母亲的 maiden name 是什么？</span>
                    <span class="lang-en hidden">What is your mother's maiden name?</span>
                </option>
                <option value="What was the name of your first pet?">
                    <span class="lang-zh">你第一只宠物的名字是什么？</span>
                    <span class="lang-en hidden">What was the name of your first pet?</span>
                </option>
                <option value="What is your favorite movie?">
                    <span class="lang-zh">你最喜欢的电影是什么？</span>
                    <span class="lang-en hidden">What is your favorite movie?</span>
                </option>
                <option value="What is your school name?">
                    <span class="lang-zh">你就读过的学校名称是什么？</span>
                    <span class="lang-en hidden">What is your school name?</span>
                </option>
            </select>
        </div>

        <!-- 密保答案 -->
        <div>
            <label for="securityAnswer" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
                <span class="lang-zh">密保答案</span>
                <span class="lang-en hidden">Security Answer</span>
            </label>
            <input type="text" id="securityAnswer" name="securityAnswer" 
                   class="w-full p-3 border border-gray-200 dark:border-gray-700 rounded-lg bg-light-card dark:bg-dark-card text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50 transition-smooth" 
                   required>
        </div>

        <!-- 提交按钮 -->
        <button type="submit" 
                class="w-full bg-primary text-white py-3 rounded-lg hover:bg-primary/90 hover:hover-lift transition-smooth font-medium">
            <span class="lang-zh">注册</span>
            <span class="lang-en hidden">Register</span>
        </button>

        <!-- 登录链接 -->
        <div class="text-center">
            <p class="text-gray-600 dark:text-gray-400 text-sm">
                <span class="lang-zh">已有账户？</span>
                <span class="lang-en hidden">Already have an account?</span>
                <a href="login.html" class="text-primary hover:underline ml-1">
                    <span class="lang-zh">立即登录</span>
                    <span class="lang-en hidden">Login now</span>
                </a>
            </p>
        </div>

        <!-- 返回主页链接 -->
        <div class="text-center">
            <a href="../../index.html" class="text-gray-600 dark:text-gray-400 text-sm hover:text-primary transition-smooth">
                <span class="lang-zh">返回主页</span>
                <span class="lang-en hidden">Back to Home</span>
            </a>
        </div>
    </form>
</div>

<!-- 页脚 -->
<footer class="mt-8 text-gray-500 dark:text-gray-400 text-sm text-center">
    <p>
        <span class="lang-zh">© 2025 Vers123 游戏导航 | 仅用于学习交流</span>
        <span class="lang-en hidden">© 2025 Vers123 Game Navigation | For learning only</span>
    </p>
</footer>

<script src="../../assets/js/common.js"></script>
<script src="../../assets/js/auth.js"></script>
<script>
    // 页面初始化
    document.addEventListener('DOMContentLoaded', function() {
        // 初始化公共功能
        initCommonFeatures();
        
        // 绑定注册表单提交事件
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            handleRegister();
        });
    });
</script>
</body>
</html>
